
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Radhika Trader | Official</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* NEW COLOR PALETTE: Deep Emerald & Platinum */
            --primary-accent: #00ff88;
            --silver-gradient: linear-gradient(135deg, #e0e0e0, #ffffff, #b0b0b0, #ffffff, #999999);
            --bg-dark: #020a08;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: var(--bg-dark);
            font-family: 'Poppins', sans-serif;
            color: #fff;
            overflow: hidden;
            position: fixed;
        }

        /* --- AMBIENT AURA ANIMATION --- */
        .background-wrapper {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            filter: blur(100px);
            opacity: 0.5;
        }

        .blob {
            position: absolute;
            width: 350px;
            height: 350px;
            background: #004d33;
            border-radius: 50%;
            animation: move 20s infinite alternate;
        }

        .blob-1 { top: -10%; left: -10%; background: #00ff88; }
        .blob-2 { bottom: -10%; right: -10%; background: #008148; animation-duration: 25s; }
        .blob-3 { top: 40%; left: 30%; width: 250px; height: 250px; background: #ffffff; animation-duration: 15s; }

        @keyframes move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(120px, 80px) scale(1.3); }
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100%;
            padding: 20px;
            text-align: center;
            z-index: 10;
        }

        .logo-wrapper {
            margin-bottom: 20px;
        }

        .logo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            padding: 4px;
            background: var(--silver-gradient);
            box-shadow: 0 10px 40px rgba(0, 255, 136, 0.3);
            animation: float 4s ease-in-out infinite;
            margin: 0 auto;
        }

        .logo img {
            width: 100%; height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #020a08;
            display: block;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: clamp(1.4rem, 6vw, 2.2rem);
            background: var(--silver-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
            line-height: 1.2;
        }

        .team-tag {
            font-size: 0.75rem;
            letter-spacing: 3px;
            color: var(--primary-accent);
            text-transform: uppercase;
            margin-bottom: 25px;
            font-weight: 600;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px 20px;
            border-radius: 28px;
            width: 100%;
            max-width: 420px;
            margin-bottom: 35px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .glass-panel p {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #d1d1d1;
            margin-bottom: 15px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.08);
            padding-top: 20px;
        }

        .stat-item b { color: var(--primary-accent); font-size: 1.2rem; }
        .stat-item p { font-size: 0.6rem; text-transform: uppercase; opacity: 0.6; letter-spacing: 1px; margin-top: 4px; }

        .btn-telegram {
            width: 100%;
            max-width: 340px;
            padding: 22px;
            font-size: 1.1rem;
            font-weight: 800;
            color: #000;
            background: var(--silver-gradient);
            text-decoration: none;
            border-radius: 100px;
            text-transform: uppercase;
            display: block;
            box-shadow: 0 15px 35px rgba(255, 255, 255, 0.2);
            animation: zoomPulse 2s infinite ease-in-out;
            letter-spacing: 1px;
        }

        @keyframes zoomPulse {
            0% { transform: scale(1); box-shadow: 0 15px 35px rgba(255, 255, 255, 0.2); }
            50% { transform: scale(1.05); box-shadow: 0 20px 45px rgba(0, 255, 136, 0.3); }
            100% { transform: scale(1); box-shadow: 0 15px 35px rgba(255, 255, 255, 0.2); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        .footer {
            margin-top: 30px;
            font-size: 0.7rem;
            opacity: 0.6;
            letter-spacing: 1px;
        }

        .agency-link {
            color: var(--primary-accent);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

        <h1>BAADSHAH BROKING ™</h1>
        <div class="team-tag">Elite Institutional Trading</div>

        <div class="glass-panel">
            <p>Access high-probability Nifty & BankNifty setups with institutional-grade accuracy. </p>
            
            <div class="stats">
                <div class="stat-item">
                    <b>95%+</b>
                    <p>Accuracy</p>
                </div>
                <div class="stat-item">
                    <b>SEBI</b>
                    <p>Verified</p>
                </div>
                <div class="stat-item">
                    <b>DAILY</b>
                    <p>Profits</p>
                </div>
            </div>
        </div>

        <a href="https://t.me/+A5pvuMDrFBdlZThl" class="btn-telegram">
            JOIN OFFICIAL CHANNEL
        </a>

        <div class="footer">
            <span>✦ NO COMPULSION | INVEST AT YOUR OWN RISK ✦</span>
            <p style="margin-top: 10px;">Managed by <br> 
                <a href="https://telegram.me/+TRlJl628l-FkMWE9" class="agency-link">NEXGROWW AGENCY</a>
            </p>
        </div>
    </div>

 

</body>

</html>
